<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DM Setting — Daily Form</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f4f6f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
      color: #111827;
    }

    .form-header {
      width: 100%;
      max-width: 560px;
      margin-bottom: 24px;
    }
    .form-header h1 {
      font-size: 22px;
      font-weight: 600;
      color: #111827;
    }
    .form-header p {
      font-size: 13.5px;
      color: #6b7280;
      margin-top: 4px;
    }

    .form-card {
      width: 100%;
      max-width: 560px;
      background: #fff;
      border-radius: 14px;
      border: 1px solid #e5e7eb;
      padding: 28px 28px;
      margin-bottom: 16px;
    }
    .form-card h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #ea580c;
      margin-bottom: 18px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .field-grid.cols-1 { grid-template-columns: 1fr; }
    .field-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .field label {
      font-size: 12px;
      font-weight: 500;
      color: #374151;
    }
    .field input, .field textarea, .field select {
      padding: 9px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: #111827;
      background: #fff;
      outline: none;
      transition: border-color .15s;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      border-color: #ea580c;
      box-shadow: 0 0 0 3px rgba(234,88,12,.08);
    }
    .field input[type="number"] { -moz-appearance: textfield; }
    .field input[type="number"]::-webkit-outer-spin-button,
    .field input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    .field textarea { resize: vertical; min-height: 72px; }

    .submit-wrap {
      width: 100%;
      max-width: 560px;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .btn-submit {
      flex: 1;
      padding: 13px;
      background: #ea580c;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-submit:hover { opacity: .88; }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }

    /* Success screen */
    .success-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 60px 20px;
    }
    .success-icon {
      width: 64px; height: 64px;
      background: rgba(234,88,12,.1);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
    }
    .success-icon svg { color: #ea580c; }
    .success-screen h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    .success-screen p  { font-size: 14px; color: #6b7280; }
    .btn-again {
      margin-top: 24px;
      padding: 10px 24px;
      background: #ea580c;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .err-bar {
      display: none;
      width: 100%;
      max-width: 560px;
      padding: 12px 16px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      color: #dc2626;
      font-size: 13.5px;
      margin-bottom: 12px;
    }

    .login-prompt {
      width: 100%;
      max-width: 560px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 40px 28px;
      text-align: center;
    }
    .login-prompt h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .login-prompt p  { font-size: 14px; color: #6b7280; margin-bottom: 20px; }
    .login-prompt a  { color: #ea580c; font-weight: 500; text-decoration: none; }
  </style>
</head>
<body>

  <div class="form-header">
    <h1>DM Setting — Daily Stats</h1>
    <p>Fill this out at the end of your shift. Takes 2 minutes.</p>
  </div>

  <div id="err-bar" class="err-bar"></div>

  <!-- Login gate -->
  <div class="login-prompt" id="login-prompt" style="display:none">
    <h2>Sign in to submit</h2>
    <p>You need to be logged in to submit your daily stats.</p>
    <a href="index.html">Go to login →</a>
  </div>

  <!-- Main form -->
  <div id="form-wrap">

    <div class="form-card">
      <h2>Basic Info</h2>
      <div class="field-grid cols-1">
        <div class="field">
          <label>Date</label>
          <input type="date" id="f-date" />
        </div>
        <div class="field">
          <label>Your name / handle</label>
          <input type="text" id="f-setter" placeholder="e.g. John" />
        </div>
      </div>
    </div>

    <div class="form-card">
      <h2>Outreach</h2>
      <div class="field-grid">
        <div class="field">
          <label>Outbounds</label>
          <input type="number" id="f-outbounds" value="0" min="0" />
        </div>
        <div class="field">
          <label>Inbounds</label>
          <input type="number" id="f-inbounds" value="0" min="0" />
        </div>
        <div class="field">
          <label>Follow Ups (First Message)</label>
          <input type="number" id="f-fu-first" value="0" min="0" />
        </div>
        <div class="field">
          <label>Follow Ups (In Convo)</label>
          <input type="number" id="f-fu-convo" value="0" min="0" />
        </div>
      </div>
    </div>

    <div class="form-card">
      <h2>Conversations</h2>
      <div class="field-grid">
        <div class="field">
          <label>Replies</label>
          <input type="number" id="f-replies" value="0" min="0" />
        </div>
        <div class="field">
          <label>Qualified Convos</label>
          <input type="number" id="f-qual-convos" value="0" min="0" />
        </div>
        <div class="field">
          <label>Pitched Calls</label>
          <input type="number" id="f-pitched" value="0" min="0" />
        </div>
        <div class="field">
          <label>Booking Links Sent</label>
          <input type="number" id="f-links" value="0" min="0" />
        </div>
      </div>
    </div>

    <div class="form-card">
      <h2>Bookings</h2>
      <div class="field-grid">
        <div class="field">
          <label>Qualified Bookings</label>
          <input type="number" id="f-qual-bookings" value="0" min="0" />
        </div>
        <div class="field">
          <label>DQ Bookings</label>
          <input type="number" id="f-dq-bookings" value="0" min="0" />
        </div>
      </div>
    </div>

    <div class="form-card">
      <h2>Notes</h2>
      <div class="field-grid cols-1">
        <div class="field">
          <label>Anything to flag today? (optional)</label>
          <textarea id="f-notes" placeholder="e.g. high DQ rate, specific campaign performing well…"></textarea>
        </div>
      </div>
    </div>

    <div class="submit-wrap">
      <button class="btn-submit" id="submit-btn">Submit daily stats</button>
    </div>

    <!-- Success -->
    <div class="success-screen" id="success-screen">
      <div class="success-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2>Stats submitted!</h2>
      <p>Your numbers are in. See you tomorrow.</p>
      <button class="btn-again" id="submit-again-btn">Submit another</button>
    </div>

  </div>

  <script type="module">
    import { sb } from './js/supabase.js';
    import { getActiveWorkspace } from './js/nav.js';

    // Default date to today
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('f-date').value = today;

    // Set workspace from URL param (e.g. ?workspace=xxx)
    const urlWs = new URLSearchParams(location.search).get('workspace');
    if (urlWs) localStorage.setItem('activeWorkspace', urlWs);

    // Check auth
    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      document.getElementById('form-wrap').style.display = 'none';
      document.getElementById('login-prompt').style.display = 'block';
    } else {
      // Pre-fill setter name from email
      const email = session.user.email;
      document.getElementById('f-setter').value = email.split('@')[0];
    }

    function showErr(msg) {
      const el = document.getElementById('err-bar');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 5000);
    }

    function n(id) { return parseInt(document.getElementById(id).value) || 0; }

    document.getElementById('submit-btn').addEventListener('click', async () => {
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Submitting…';

      const wsId = getActiveWorkspace();
      const date = document.getElementById('f-date').value;
      const setter = document.getElementById('f-setter').value.trim();

      if (!date) { showErr('Please select a date.'); btn.disabled = false; btn.textContent = 'Submit daily stats'; return; }

      const payload = {
        workspace_id: wsId || null,
        date,
        setter,
        outbounds:          n('f-outbounds'),
        inbounds:           n('f-inbounds'),
        follow_ups_first:   n('f-fu-first'),
        follow_ups_convo:   n('f-fu-convo'),
        replies:            n('f-replies'),
        qualified_convos:   n('f-qual-convos'),
        pitched_calls:      n('f-pitched'),
        booking_links_sent: n('f-links'),
        qualified_bookings: n('f-qual-bookings'),
        dq_bookings:        n('f-dq-bookings'),
        notes:              document.getElementById('f-notes').value.trim() || null,
      };

      const { error } = await sb.from('dm_setting').insert(payload);
      if (error) {
        showErr(error.message);
        btn.disabled = false;
        btn.textContent = 'Submit daily stats';
        return;
      }

      // Fire Zapier webhook if configured for this workspace
      if (wsId) {
        const { data: ws } = await sb.from('workspaces').select('webhook_setting').eq('id', wsId).single();
        if (ws?.webhook_setting) {
          const totalOutreach = payload.outbounds + payload.inbounds + payload.follow_ups_first;
          const apptRate = totalOutreach ? ((payload.qualified_bookings / totalOutreach) * 100).toFixed(1) + '%' : '—';
          fetch(ws.webhook_setting, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              ...payload,
              total_outreach: totalOutreach,
              appt_booking_rate: apptRate,
              submitted_at: new Date().toISOString(),
            }),
          }).catch(() => {}); // fire-and-forget
        }
      }

      // Show success
      document.getElementById('form-wrap').querySelector('.form-card')?.parentElement;
      document.querySelectorAll('.form-card, .submit-wrap').forEach(el => el.style.display = 'none');
      const s = document.getElementById('success-screen');
      s.style.display = 'flex';
    });

    document.getElementById('submit-again-btn').addEventListener('click', () => {
      document.querySelectorAll('.form-card, .submit-wrap').forEach(el => el.style.display = '');
      document.getElementById('success-screen').style.display = 'none';
      document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
      document.querySelectorAll('input[type="number"]').forEach(i => i.value = '0');
      document.getElementById('f-notes').value = '';
    });
  </script>
</body>
</html>
