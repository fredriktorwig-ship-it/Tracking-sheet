<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tracking Sheet — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f4f6f9;
      color: #0f1117;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .login-wrap { width: 100%; max-width: 380px; padding: 24px; }

    .login-heading {
      margin-bottom: 28px;
      text-align: center;
    }
    .login-heading h1 { font-size: 22px; font-weight: 600; color: #0f1117; }
    .login-heading p  { font-size: 13.5px; color: #6b7280; margin-top: 5px; }

    .card {
      background: #fff;
      border: 1px solid #e2e6ed;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 1px 8px rgba(0,0,0,.05);
    }

    .field { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 12.5px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 10px 13px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      color: #0f1117;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus {
      border-color: #ea580c;
      box-shadow: 0 0 0 3px rgba(234,88,12,.08);
      background: #fff;
    }

    .btn {
      width: 100%;
      padding: 11px;
      border-radius: 8px;
      border: none;
      background: #ea580c;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
      margin-top: 6px;
    }
    .btn:hover { opacity: .88; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .error {
      background: rgba(220,38,38,.06);
      border: 1px solid rgba(220,38,38,.2);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #dc2626;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-heading">
      <h1>Sign in</h1>
      <p>Enter your credentials to continue</p>
    </div>
    <div class="card">
      <div class="error" id="error-msg"></div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn" id="login-btn">Sign in</button>
    </div>
  </div>

  <script type="module">
    import { sb } from './js/supabase.js';

    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'dashboard.html';
    });

    const btn   = document.getElementById('login-btn');
    const email = document.getElementById('email');
    const pass  = document.getElementById('password');
    const err   = document.getElementById('error-msg');

    async function login() {
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      err.style.display = 'none';
      try {
        const { error } = await sb.auth.signInWithPassword({ email: email.value, password: pass.value });
        if (error) throw error;
        window.location.href = 'dashboard.html';
      } catch(e) {
        err.textContent = e.message || 'Invalid email or password';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    }

    btn.addEventListener('click', login);
    [email, pass].forEach(el => el.addEventListener('keydown', e => { if (e.key === 'Enter') login(); }));
  </script>
</body>
</html>
