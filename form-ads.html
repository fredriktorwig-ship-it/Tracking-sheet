<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ads — Daily Form</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f4f6f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
      color: #111827;
    }

    .form-header { width: 100%; max-width: 620px; margin-bottom: 30px; text-align: center; }
    .form-header h1 { font-size: 26px; font-weight: 700; color: #111827; letter-spacing: -0.01em; }
    .form-header p  { font-size: 14.5px; color: #6b7280; margin-top: 6px; }

    .form-card {
      width: 100%;
      max-width: 620px;
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e5e7eb;
      padding: 36px 38px;
      margin-bottom: 22px;
    }
    .form-card h2 {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #ea580c;
      margin-bottom: 26px;
    }

    .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
    .field-grid.cols-1 { grid-template-columns: 1fr; }
    .field-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

    .field { display: flex; flex-direction: column; gap: 8px; }
    .field label { font-size: 13px; font-weight: 500; color: #374151; line-height: 1.4; }
    .field input, .field textarea {
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 9px;
      font-family: 'Inter', sans-serif;
      font-size: 14.5px;
      color: #111827;
      background: #fff;
      outline: none;
      transition: border-color .15s;
    }
    .field input:focus, .field textarea:focus {
      border-color: #ea580c;
      box-shadow: 0 0 0 3px rgba(234,88,12,.08);
    }
    .field input[type="number"] { -moz-appearance: textfield; }
    .field input[type="number"]::-webkit-outer-spin-button,
    .field input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    .field textarea { resize: vertical; min-height: 72px; }

    .field .prefix-wrap { position: relative; }
    .field .prefix-wrap span {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      color: #6b7280; font-size: 14px; pointer-events: none;
    }
    .field .prefix-wrap input { padding-left: 24px; }

    .submit-wrap { width: 100%; max-width: 620px; }
    .btn-submit {
      width: 100%;
      padding: 13px;
      background: #ea580c;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-submit:hover { opacity: .88; }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }

    .success-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 60px 20px;
      width: 100%;
      max-width: 620px;
    }
    .success-icon {
      width: 64px; height: 64px;
      background: rgba(234,88,12,.1);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
      color: #ea580c;
    }
    .success-screen h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    .success-screen p  { font-size: 14px; color: #6b7280; }
    .btn-again {
      margin-top: 24px;
      padding: 10px 24px;
      background: #ea580c;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .err-bar {
      display: none;
      width: 100%;
      max-width: 620px;
      padding: 12px 16px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      color: #dc2626;
      font-size: 13.5px;
      margin-bottom: 12px;
    }

    .login-prompt {
      width: 100%; max-width: 620px;
      background: #fff; border: 1px solid #e5e7eb;
      border-radius: 14px; padding: 40px 28px; text-align: center;
    }
    .login-prompt h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .login-prompt p  { font-size: 14px; color: #6b7280; margin-bottom: 20px; }
    .login-prompt a  { color: #ea580c; font-weight: 500; text-decoration: none; }
  </style>
</head>
<body>

  <div class="form-header">
    <h1>Ads — Daily Numbers</h1>
    <p>Enter today's ad performance. Takes 2 minutes.</p>
  </div>

  <div id="err-bar" class="err-bar"></div>

  <div class="login-prompt" id="login-prompt" style="display:none">
    <h2>Sign in to submit</h2>
    <p>You need to be logged in to submit daily ad numbers.</p>
    <a href="index.html">Go to login →</a>
  </div>

  <div id="form-wrap">

    <div class="form-card">
      <h2>Basic Info</h2>
      <div class="field-grid cols-1">
        <div class="field">
          <label>Date</label>
          <input type="date" id="f-date" />
        </div>
      </div>
    </div>

    <div class="form-card">
      <h2>Reach</h2>
      <div class="field-grid">
        <div class="field">
          <label>Total Followers from Ads</label>
          <input type="number" id="f-followers" value="0" min="0" />
        </div>
        <div class="field">
          <label>Qualified Followers from Ads</label>
          <input type="number" id="f-qual-followers" value="0" min="0" />
        </div>
      </div>
    </div>

    <div class="form-card">
      <h2>DMs &amp; Conversations</h2>
      <div class="field-grid">
        <div class="field">
          <label>Inbounds</label>
          <input type="number" id="f-inbounds" value="0" min="0" />
        </div>
        <div class="field">
          <label>Outbounds</label>
          <input type="number" id="f-outbounds" value="0" min="0" />
        </div>
        <div class="field">
          <label>Replies</label>
          <input type="number" id="f-replies" value="0" min="0" />
        </div>
        <div class="field">
          <label>Qualified Convos</label>
          <input type="number" id="f-qual-convos" value="0" min="0" />
        </div>
      </div>
    </div>

    <div class="form-card">
      <h2>Conversions</h2>
      <div class="field-grid">
        <div class="field">
          <label>Pitched Calls</label>
          <input type="number" id="f-pitched" value="0" min="0" />
        </div>
        <div class="field">
          <label>Booking Links Sent</label>
          <input type="number" id="f-links" value="0" min="0" />
        </div>
        <div class="field">
          <label>Booked Calls</label>
          <input type="number" id="f-booked" value="0" min="0" />
        </div>
      </div>
    </div>

    <div class="form-card">
      <h2>Notes</h2>
      <div class="field-grid cols-1">
        <div class="field">
          <label>Anything to flag? (optional)</label>
          <textarea id="f-notes" placeholder="e.g. CPL spiked today, paused campaign X…"></textarea>
        </div>
      </div>
    </div>

    <div class="submit-wrap">
      <button class="btn-submit" id="submit-btn">Submit daily numbers</button>
    </div>

    <div class="success-screen" id="success-screen">
      <div class="success-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2>Numbers submitted!</h2>
      <p>All done. Data is in the dashboard.</p>
      <button class="btn-again" id="submit-again-btn">Submit another</button>
    </div>

  </div>

  <script type="module">
    import { sb } from './js/supabase.js';
    import { getActiveWorkspace } from './js/nav.js';

    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];

    // Set workspace from URL param
    const urlWs = new URLSearchParams(location.search).get('workspace');
    if (urlWs) localStorage.setItem('activeWorkspace', urlWs);

    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      document.getElementById('form-wrap').style.display = 'none';
      document.getElementById('login-prompt').style.display = 'block';
    }

    function showErr(msg) {
      const el = document.getElementById('err-bar');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 5000);
    }

    function n(id) { return parseFloat(document.getElementById(id).value) || 0; }

    document.getElementById('submit-btn').addEventListener('click', async () => {
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Submitting…';

      const wsId = getActiveWorkspace();
      const date = document.getElementById('f-date').value;
      if (!date) { showErr('Please select a date.'); btn.disabled = false; btn.textContent = 'Submit daily numbers'; return; }

      const payload = {
        workspace_id:        wsId || null,
        date,
        total_followers:     n('f-followers'),
        qualified_followers: n('f-qual-followers'),
        inbounds:            n('f-inbounds'),
        outbounds:           n('f-outbounds'),
        replies:             n('f-replies'),
        qualified_convos:    n('f-qual-convos'),
        pitched_calls:       n('f-pitched'),
        booking_links_sent:  n('f-links'),
        booked_calls:        n('f-booked'),
        notes:               document.getElementById('f-notes').value.trim() || null,
      };

      const { error } = await sb.from('ads').insert(payload);
      if (error) {
        showErr(error.message);
        btn.disabled = false;
        btn.textContent = 'Submit daily numbers';
        return;
      }

      // Fire Zapier webhook if configured
      if (wsId) {
        const { data: ws } = await sb.from('workspaces').select('webhook_ads').eq('id', wsId).single();
        if (ws?.webhook_ads) {
          fetch(ws.webhook_ads, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              ...payload,
              submitted_at: new Date().toISOString(),
            }),
          }).catch(() => {});
        }
      }

      document.querySelectorAll('.form-card, .submit-wrap').forEach(el => el.style.display = 'none');
      document.getElementById('success-screen').style.display = 'flex';
    });

    document.getElementById('submit-again-btn').addEventListener('click', () => {
      document.querySelectorAll('.form-card, .submit-wrap').forEach(el => el.style.display = '');
      document.getElementById('success-screen').style.display = 'none';
      document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
      document.querySelectorAll('input[type="number"]').forEach(i => i.value = '0');
      document.getElementById('f-notes').value = '';
    });
  </script>
</body>
</html>
