<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tracking Sheet — Payments</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/shared.css" />
  <style>
    /* Sub-tabs */
    .sub-tabs {
      display: flex;
      gap: 4px;
      padding: 0 28px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .sub-tab {
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text2);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color .15s, border-color .15s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      font-family: 'Inter', sans-serif;
    }
    .sub-tab:hover { color: var(--text); }
    .sub-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 600;
    }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon"></div>
      <span></span>
    </div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-user">
      <div class="sidebar-user-email" id="user-email">—</div>
    </div>
    <div id="sidebar-footer"></div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div>
          <div class="page-title">Payments</div>
          <div class="page-subtitle">Track cash collected across funnels</div>
        </div>
      </div>
      <button id="add-btn">＋ Add record</button>
    </div>

    <!-- Sub-tabs: High Ticket vs Microcourse -->
    <div class="sub-tabs">
      <button class="sub-tab active" data-tab="payments">High Ticket</button>
      <button class="sub-tab" data-tab="microcourse">Microcourse</button>
    </div>

    <div class="filter-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Search payments…" />
      </div>
      <div class="date-filter">
        <label>From</label>
        <input type="date" id="filter-from" />
        <label>To</label>
        <input type="date" id="filter-to" />
        <button class="btn-filter apply" id="apply-dates">Apply</button>
        <button class="btn-filter" id="clear-dates">Clear</button>
      </div>
    </div>

    <div class="table-wrap">
      <div id="page-error"></div>
      <div id="table-loading"><div class="spinner"></div> Loading…</div>
      <div id="table-wrap" style="display:none">
        <table>
          <thead id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>

  <div id="panel-overlay"></div>
  <div id="form-panel">
    <div class="panel-header">
      <span id="form-title">Add record</span>
      <button id="panel-close">✕</button>
    </div>
    <div class="panel-body">
      <div id="form-fields"></div>
    </div>
    <div class="panel-footer">
      <button id="form-submit">Save record</button>
    </div>
  </div>
  </div>


  <script type="module">
    import { requireAuth } from './js/auth.js';
    import { renderNav }   from './js/nav.js';
    import { TablePage }   from './js/table.js';

    await requireAuth();
    await renderNav('payments');

    // Two configs — swapped when sub-tab clicked
    const PAYMENTS_CONFIG = {
      table: 'payments',
      defaultSort: 'date',
      columns: [
        { key: 'date',          label: 'Date',          type: 'date' },
        { key: 'customer_name', label: 'Customer Name', type: 'text' },
        { key: 'amount',        label: 'Amount',        type: 'currency' },
        { key: 'utm',           label: 'UTM',           type: 'text' },
        { key: 'notes',         label: 'Notes',         type: 'text' },
      ],
      formFields: [
        { key: 'date',          label: 'Date',          type: 'date' },
        { key: 'customer_name', label: 'Customer Name', type: 'text' },
        { key: 'amount',        label: 'Amount',        type: 'currency' },
        { key: 'utm',           label: 'UTM',           type: 'text' },
        { key: 'notes',         label: 'Notes',         type: 'textarea' },
      ],
    };

    const MICROCOURSE_CONFIG = {
      table: 'microcourse',
      defaultSort: 'date',
      columns: [
        { key: 'date',          label: 'Date',          type: 'date' },
        { key: 'customer_name', label: 'Customer Name', type: 'text' },
        { key: 'amount',        label: 'Amount',        type: 'currency' },
      ],
      formFields: [
        { key: 'date',          label: 'Date',          type: 'date' },
        { key: 'customer_name', label: 'Customer Name', type: 'text' },
        { key: 'amount',        label: 'Amount',        type: 'currency' },
      ],
    };

    const page = new TablePage(PAYMENTS_CONFIG);
    await page.init();

    // Sub-tab switching
    document.querySelectorAll('.sub-tab').forEach(btn => {
      btn.addEventListener('click', async () => {
        document.querySelectorAll('.sub-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const tab = btn.dataset.tab;
        const cfg = tab === 'microcourse' ? MICROCOURSE_CONFIG : PAYMENTS_CONFIG;
        const placeholder = tab === 'microcourse' ? 'Search microcourse…' : 'Search payments…';
        document.getElementById('search-input').placeholder = placeholder;
        document.getElementById('search-input').value = '';
        await page.switchTable(cfg);
      });
    });
  </script>
</body>
</html>
